{% extends "base.html" %}
{% block content %}
<h2>Editar libro</h2>

<form method="post">
  <label for="titulo">Título</label>
  <input id="titulo" name="titulo" value="{{ libro.get_titulo() }}" required>

  <br><br>
  <label for="autor">Autor</label>
  <input id="autor" name="autor" value="{{ libro.get_autor() }}" required>

  <br><br>
  <label for="cantidad">Cantidad</label>
  <input id="cantidad" name="cantidad" type="number" min="0" value="{{ libro.get_cantidad() }}" required>

  <br><br>
  <label for="precio">Precio</label>
  <input id="precio" name="precio" type="number" step="0.01" min="0" value="{{ libro.get_precio() }}" required>

  <div class="form-actions">
    <button class="btn" type="submit">Actualizar</button>
    <a class="btn btn-secondary" href="{{ url_for('libros') }}">Volver</a>
  </div>
</form>
{% endblock %}
