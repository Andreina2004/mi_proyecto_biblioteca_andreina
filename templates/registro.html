{% extends "base.html" %}

{% block content %}
<h2>Registro de usuario</h2>

<form method="POST">
  <label>Nombre:</label>
  <input type="text" name="nombre" required>

  <label>Correo:</label>
  <input type="email" name="mail" required>

  <label>Contraseña:</label>
  <input type="password" name="password" required>

  <button type="submit">Registrarse</button>
</form>
{% endblock %}
